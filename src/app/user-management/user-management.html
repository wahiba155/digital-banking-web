<div class="container mt-2">
  <div class="card">
    <div class="card-header d-flex justify-content-between">
  <span>User Management</span>
  <button class="btn btn-sm btn-success" 
          (click)="showAddForm = !showAddForm">
    <i class="bi bi-plus"></i> 
    {{ showAddForm ? 'Cancel' : 'New User' }}
  </button>
</div>
<div class="card-body">
  <!-- Formulaire ajout — visible seulement si showAddForm=true -->
  <div *ngIf="showAddForm" class="mb-3 p-3 border rounded bg-light">
    <h6>Add New User</h6>
    <form [formGroup]="newUserForm" (ngSubmit)="handleAddUser()">
      <div class="row g-2">
        <div class="col-md-3">
          <input type="text" formControlName="username" 
                 class="form-control" placeholder="Username">
        </div>
        <div class="col-md-3">
          <input type="password" formControlName="password" 
                 class="form-control" placeholder="Password">
        </div>
        <div class="col-md-3">
          <input type="email" formControlName="email" 
                 class="form-control" placeholder="Email">
        </div>
        <div class="col-md-3">
          <select formControlName="roles" class="form-select">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </div>
      </div>
      <div class="mt-2">
        <button type="submit" 
                [disabled]="!newUserForm.valid"
                class="btn btn-success">
          Add User
        </button>
      </div>
    </form>
  </div>
  </div>
</div>
